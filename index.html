<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>

</head>

<body>
  <main>
    <div class="container">
      <div class="product">
      <picture>
        <source media="(min-width: 768px)" srcset="images/image-product-desktop.jpg">
        <source media="(min-width: 375px)" srcset="images/image-product-mobile.jpg">
        <img src="images/image-product-mobile.jpg" alt="Image Product">
      </picture>
      </div>

      <div class="container-content">

        <div class="introduction">
          <span class="category">PERFUME</span>
          <h1 class="title">Gabrielle Essence Eau De Parfum</h1>
          <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
            Perfumer-Creator
            for the House of CHANEL.</p>
        </div>

        <div class="price">
          <p class="new-price">$149.99</p>
          <span class="old-price">$169.99</span>
        </div>

        <a href="#" class="cart">
          <img src="images/icon-cart.svg" alt="Icon cart">
          <p class="add-cart">Add to Cart</p>
        </a>

      </div>
    </div>
  </main>



</body>

</html>
